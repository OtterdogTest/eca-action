name: "eca-check"
on:
  pull_request:

permissions:
  checks: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Wait for eclipsefdn/eca status check to complete
        uses: autotelic/action-wait-for-status-check@v1
        id: wait-for-status
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          statusName: "eclipsefdn/eca"

      - uses: LouisBrunner/checks-action@v1.6.0
        if: steps.wait-for-status.outputs.state == 'success'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: eca-check
          conclusion: 'success'
          output: |
            {"summary":"${{ steps.wait-for-status.outputs.description }}"}

      - uses: LouisBrunner/checks-action@v1.6.0
        if: steps.wait-for-status.outputs.state != 'success'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: eca-check
          conclusion: 'failure'
          output: |
            {"summary":"${{ steps.wait-for-status.outputs.description }}"}